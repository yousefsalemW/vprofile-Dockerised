<svg viewBox="0 0 920 1010" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,'Segoe UI',system-ui,sans-serif">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#16233b" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowP" cx="82%" cy="6%" r="45%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowT" cx="10%" cy="94%" r="48%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#5b7099" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aho" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#ff9f1c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="920" height="1010" rx="18" fill="#0a0f1a"/>
  <rect x="0" y="0" width="920" height="1010" rx="18" fill="url(#grid)"/>
  <rect x="0" y="0" width="920" height="1010" rx="18" fill="url(#glowP)"/>
  <rect x="0" y="0" width="920" height="1010" rx="18" fill="url(#glowT)"/>
  <rect x="8" y="8" width="904" height="994" rx="14" fill="none" stroke="#22314d" stroke-width="1"/>

  <!-- title -->
  <text x="40" y="52" font-size="22" font-weight="700" fill="#ffffff">VProfile · Docker Architecture</text>
  <text x="40" y="74" font-family="ui-monospace,'Courier New',monospace" font-size="12" letter-spacing="1" fill="#6d7f9e">3-tier Java app · multi-stage build · docker compose</text>

  <!-- ===== ZONE 1 : BUILD ===== -->
  <text x="40" y="112" font-family="ui-monospace,'Courier New',monospace" font-size="12" letter-spacing="2" fill="#2dd4bf">① BUILD PHASE — MULTI-STAGE DOCKERFILE</text>
  <line x1="40" y1="122" x2="880" y2="122" stroke="#1f2c47" stroke-width="1"/>

  <!-- A: build context -->
  <rect x="40" y="150" width="185" height="96" rx="10" fill="#0f1626" stroke="#3a4c70" stroke-width="1.2"/>
  <rect x="40" y="150" width="185" height="4" rx="2" fill="#5b7099"/>
  <text x="132" y="182" text-anchor="middle" font-size="15" font-weight="700" fill="#e6ebf5">Build Context</text>
  <text x="132" y="206" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#9fb0cc">src/  ·  pom.xml</text>
  <text x="132" y="226" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10" fill="#6d7f9e">COPY . .</text>

  <line x1="225" y1="198" x2="258" y2="198" stroke="#5b7099" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- B: builder -->
  <rect x="262" y="150" width="185" height="96" rx="10" fill="#0f1626" stroke="#ff9f1c" stroke-width="1.2"/>
  <rect x="262" y="150" width="185" height="4" rx="2" fill="#ff9f1c"/>
  <text x="354" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#e6ebf5">Stage 1 · Builder</text>
  <text x="354" y="200" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#ff9f1c">maven:3.9.9-temurin-8</text>
  <text x="354" y="220" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#9fb0cc">mvn clean package</text>
  <text x="354" y="237" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">(JDK + Maven · discarded)</text>

  <line x1="447" y1="198" x2="480" y2="198" stroke="#ff9f1c" stroke-width="1.6" marker-end="url(#aho)"/>
  <text x="463" y="188" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9" fill="#ff9f1c">.war</text>

  <!-- C: runtime -->
  <rect x="484" y="150" width="185" height="96" rx="10" fill="#0f1626" stroke="#2dd4bf" stroke-width="1.2"/>
  <rect x="484" y="150" width="185" height="4" rx="2" fill="#2dd4bf"/>
  <text x="576" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#e6ebf5">Stage 2 · Runtime</text>
  <text x="576" y="200" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#2dd4bf">tomcat:9-jre8-temurin</text>
  <text x="576" y="220" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#9fb0cc">COPY war → ROOT.war</text>
  <text x="576" y="237" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">non-root · appuser</text>

  <line x1="669" y1="198" x2="702" y2="198" stroke="#5b7099" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- D: app image -->
  <rect x="706" y="150" width="174" height="96" rx="10" fill="#0f1626" stroke="#a78bfa" stroke-width="1.2"/>
  <rect x="706" y="150" width="174" height="4" rx="2" fill="#a78bfa"/>
  <text x="793" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#e6ebf5">app image</text>
  <text x="793" y="210" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#a78bfa">vprofile:latest</text>
  <text x="793" y="229" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">JRE + Tomcat + WAR</text>

  <!-- image feeds runtime app -->
  <path d="M793 246 L793 300 L460 300 L460 350" fill="none" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5 5" marker-end="url(#ah)"/>
  <text x="628" y="292" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#8a97b5">image used by ▸ app container</text>

  <!-- ===== ZONE 2 : RUNTIME ===== -->
  <text x="40" y="340" font-family="ui-monospace,'Courier New',monospace" font-size="12" letter-spacing="2" fill="#2dd4bf">② RUNTIME PHASE — DOCKER COMPOSE</text>

  <!-- User / browser -->
  <rect x="340" y="350" width="240" height="58" rx="10" fill="#0b1220" stroke="#3a4c70" stroke-width="1.2"/>
  <text x="460" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#e6ebf5">User / Browser</text>
  <text x="460" y="395" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#2dd4bf">http://localhost:8080</text>

  <line x1="460" y1="408" x2="460" y2="482" stroke="#5b7099" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="472" y="450" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#8a97b5">HTTP :8080</text>

  <!-- Network container -->
  <rect x="40" y="460" width="840" height="510" rx="16" fill="none" stroke="#2a3b5e" stroke-width="1.4" stroke-dasharray="8 6"/>
  <rect x="56" y="448" width="360" height="24" rx="6" fill="#0a0f1a"/>
  <text x="66" y="465" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#6d7f9e">docker network · vprofile_default (bridge)</text>

  <!-- app container -->
  <rect x="335" y="496" width="250" height="96" rx="10" fill="#0f1626" stroke="#2dd4bf" stroke-width="1.4"/>
  <rect x="335" y="496" width="4" height="96" rx="2" fill="#2dd4bf"/>
  <text x="460" y="528" text-anchor="middle" font-size="16" font-weight="700" fill="#e6ebf5">app · Tomcat</text>
  <text x="460" y="552" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#2dd4bf">ROOT.war   :8080</text>
  <text x="460" y="572" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10" fill="#6d7f9e">build: .  (multi-stage)</text>

  <!-- arrows app -> backends -->
  <path d="M400 592 L210 698" fill="none" stroke="#5b7099" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="262" y="642" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#ff9f1c">JDBC :3306</text>

  <line x1="460" y1="592" x2="460" y2="698" stroke="#5b7099" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="472" y="650" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#a78bfa">AMQP :5672</text>

  <path d="M522 592 L710 698" fill="none" stroke="#5b7099" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="658" y="642" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#38bdf8">cache :11211</text>

  <!-- db01 -->
  <rect x="80" y="702" width="230" height="104" rx="10" fill="#0f1626" stroke="#ff9f1c" stroke-width="1.3"/>
  <rect x="80" y="702" width="4" height="104" rx="2" fill="#ff9f1c"/>
  <text x="195" y="732" text-anchor="middle" font-size="16" font-weight="700" fill="#e6ebf5">db01</text>
  <text x="195" y="754" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#ff9f1c">mysql:8.0   :3306</text>
  <text x="195" y="774" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#9fb0cc">database: accounts</text>
  <text x="195" y="793" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">restart: unless-stopped</text>

  <!-- rmq01 -->
  <rect x="345" y="702" width="230" height="104" rx="10" fill="#0f1626" stroke="#a78bfa" stroke-width="1.3"/>
  <rect x="345" y="702" width="4" height="104" rx="2" fill="#a78bfa"/>
  <text x="460" y="732" text-anchor="middle" font-size="16" font-weight="700" fill="#e6ebf5">rmq01</text>
  <text x="460" y="754" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#a78bfa">rabbitmq:3-mgmt</text>
  <text x="460" y="774" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#9fb0cc">amqp :5672</text>
  <text x="460" y="793" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#9fb0cc">mgmt UI :15672</text>

  <!-- mc01 -->
  <rect x="610" y="702" width="220" height="104" rx="10" fill="#0f1626" stroke="#38bdf8" stroke-width="1.3"/>
  <rect x="610" y="702" width="4" height="104" rx="2" fill="#38bdf8"/>
  <text x="720" y="732" text-anchor="middle" font-size="16" font-weight="700" fill="#e6ebf5">mc01</text>
  <text x="720" y="754" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="11" fill="#38bdf8">memcached:1.6</text>
  <text x="720" y="774" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" fill="#9fb0cc">cache :11211</text>
  <text x="720" y="793" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">stateless</text>

  <!-- db_backup.sql init -->
  <rect x="80" y="842" width="230" height="46" rx="9" fill="#0b1220" stroke="#3a4c70" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="195" y="861" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10" fill="#9fb0cc">db_backup.sql</text>
  <text x="195" y="877" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9" fill="#6d7f9e">/docker-entrypoint-initdb.d/</text>
  <line x1="195" y1="842" x2="195" y2="808" stroke="#5b7099" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="250" y="830" font-family="ui-monospace,'Courier New',monospace" font-size="8.5" fill="#8a97b5">seed on init</text>

  <!-- db_data volume -->
  <ellipse cx="415" cy="850" rx="46" ry="9" fill="#0f1626" stroke="#ff9f1c" stroke-width="1.2"/>
  <path d="M369 850 L369 878 A46 9 0 0 0 461 878 L461 850" fill="#0f1626" stroke="#ff9f1c" stroke-width="1.2"/>
  <ellipse cx="415" cy="850" rx="46" ry="9" fill="none" stroke="#ff9f1c" stroke-width="1.2"/>
  <text x="415" y="873" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10" fill="#ff9f1c">db_data</text>
  <path d="M310 778 L368 852" fill="none" stroke="#5b7099" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="362" y="808" font-family="ui-monospace,'Courier New',monospace" font-size="8.5" fill="#8a97b5">volume</text>
  <text x="415" y="908" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="9" fill="#6d7f9e">named volume · /var/lib/mysql</text>

  <!-- legend -->
  <text x="610" y="852" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">──  services resolve by name via</text>
  <text x="610" y="868" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">      Docker internal DNS (db01 /</text>
  <text x="610" y="884" font-family="ui-monospace,'Courier New',monospace" font-size="9.5" fill="#6d7f9e">      rmq01 / mc01)</text>

  <!-- signature -->
  <text x="880" y="992" text-anchor="end" font-family="ui-monospace,'Courier New',monospace" font-size="10" letter-spacing="1" fill="#ff9f1c">ALnaqib · DevOps Engineer</text>
</svg>
